<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Portal.mn/Login</title>
</head>

<body class="bg-black">
    <div class="flex items-center justify-center h-screen">
        <div class="flex flex-col items-center justify-center w-[450px] h-[600px] p-6">
            <div class="flex items-center justify-center w-20">
                <img src="https://cdn.portal.mn/assets/mobile-logo.png" alt="Portal.mn Logo" />
            </div>
            <div class="flex items-center justify-center mt-8">
                <p class="text-white text-2xl">Нэвтрэх</p>
            </div>

            <div class="w-full mt-14">
                <p class="text-white text-ms">*И-мэйл / Хэрэглэгчийн нэр</p>
                <div class="px-1 py-2 rounded-lg bg-gray-900 h-10 text-white mt-1">
                    <input type="text" placeholder="И-мэйл хаяг эсвэл хэрэглэгчийн нэр оруулна уу" class="w-full" />
                </div>

                <div class="relative w-full mt-10">
                    <p class="text-white text-ms">*Нууц үг</p>
                    <div class="px-1 py-2 rounded-lg bg-gray-900 h-10 text-white mt-1">
                        <input id="password" type="password" placeholder="Нууц үгээ оруулна уу"
                            class="w-full" />
                        <button type="button" id="togglePassword"
                            class="absolute top-1/2 right-2 mt-4 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <svg id="eyeIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none"
                                viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-center w-[400px] mt-18">
                <button class="w-full py-2 rounded-lg bg-white text-black text-lg">
                    Нэвтрэх
                </button>
            </div>

            <div class="flex mt-8">
                <p class="ml-4 text-white text-sm">Privacy Policy</p>
                <p class="ml-4 text-white text-sm">Terms of Service</p>
            </div>

            <div class="mt-4">
                <p class="text-white">Бүртгэлгүй бол ЭНД ДАРНА УУ</p>
            </div>

        </div>

        <script>
            const password = document.getElementById("password");
            const togglePassword = document.getElementById("togglePassword");
            const eyeIcon = document.getElementById("eyeIcon");

            togglePassword.addEventListener("click", function () {
                if (password.type === "password") {
                    password.type = "text";
                    eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />`;
                } else {
                    password.type = "password";
                    eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />`;
                }
            });
        </script>
</body>
</html>
